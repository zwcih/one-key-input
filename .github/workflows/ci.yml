name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: lukka/get-cmake@latest

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/vcpkg
            ${{ github.workspace }}/build/default/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Set up vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: NuGet restore (Azure Speech SDK)
        shell: pwsh
        run: |
          mkdir -Force nuget\packages | Out-Null
          & scripts\tools\nuget.exe restore nuget\packages.config `
              -PackagesDirectory nuget\packages -NonInteractive

      - name: Build Core (Debug, just to verify it compiles)
        shell: pwsh
        run: |
          cmake --preset=default
          cmake --build build\default

      - name: Run Core unit tests (ctest)
        shell: pwsh
        working-directory: build\default
        run: ctest --output-on-failure -C Debug

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: settings/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: settings/src-tauri

      - name: Type-check + build Settings UI
        shell: pwsh
        working-directory: settings
        run: |
          npm ci
          npm run tauri build

      - name: Settings UI unit tests (Vitest)
        shell: pwsh
        working-directory: settings
        run: npm test

      - name: Tauri backend unit tests (cargo test)
        shell: pwsh
        working-directory: settings/src-tauri
        run: cargo test --lib
